syntax = "proto3";

option java_package = "com.rawlabs.protocol.das";
option java_multiple_files = true;

package com.rawlabs.protocol.das;

message AggFunction {
  AggType type = 1;
}

enum AggType {
  COUNT = 0;
  SUM = 1;
  AVG = 2;
  MIN = 3;
  MAX = 4;
}

message Aggs {
  map<string, Agg> aggs = 1;
}

message Agg {
  AggFunction aggFunction = 1;
  string column = 2;
}

message GroupClauses {
  repeated string name = 1;
}