syntax = "proto3";

option java_package = "com.rawlabs.protocol.das.services";
option java_multiple_files = true;

package com.rawlabs.protocol.das.services;

import "com/rawlabs/protocol/das/das.proto";
import "com/rawlabs/protocol/das/functions.proto";
import "com/rawlabs/protocol/raw/values.proto";

service FunctionsService {

  rpc GetFunctionDefinitions (GetFunctionDefinitionsRequest) returns (GetFunctionDefinitionsResponse);

  rpc ExecuteFunction (ExecuteFunctionRequest) returns (ExecuteFunctionResponse);

}

message GetFunctionDefinitionsRequest {
  DASId dasId = 1;
}

message GetFunctionDefinitionsResponse {
  repeated FunctionDefinition functionDefinitions = 1;
}

message ExecuteFunctionRequest {
  DASId dasId = 1;
  string functionName = 2;
  repeated Argument arguments = 3;
}

message ExecuteFunctionResponse {
  com.rawlabs.protocol.raw.Value result = 1;
}