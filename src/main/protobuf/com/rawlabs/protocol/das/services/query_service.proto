syntax = "proto3";

option java_package = "com.rawlabs.protocol.das.services";
option java_multiple_files = true;

package com.rawlabs.protocol.das.services;

import "com/rawlabs/protocol/das/das.proto";
import "com/rawlabs/protocol/das/rows.proto";

service QueryService {

  rpc GetQueryEstimate (QueryRequest) returns (GetQueryEstimateResponse);

  rpc ExecuteQuery (QueryRequest) returns (stream Rows);

}

message QueryRequest {
  DASId dasId = 1;
  string sql = 2;
  optional string planId = 3;
}

message GetQueryEstimateResponse {
  uint64 rows = 1;
  uint32 bytes = 2;
}
